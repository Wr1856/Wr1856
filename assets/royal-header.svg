<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Wesley Maia</title>
  <desc id="desc">Desenvolvimento de software, aplicações web e automação</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070B"/>
      <stop offset="53%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#172A46"/>
    </linearGradient>

    <radialGradient id="glow" cx="34%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#324C72" stop-opacity=".34"/>
      <stop offset="68%" stop-color="#101B2D" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#05070B" stop-opacity="0"/>
    </radialGradient>

    <pattern id="paper" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="6" r=".5" fill="#F1E6C8" opacity=".035"/>
      <circle cx="15" cy="12" r=".45" fill="#8FA5C8" opacity=".025"/>
      <path d="M0 18L18 0" stroke="#F1E6C8" stroke-opacity=".012"/>
    </pattern>

    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#8E7742"/>
      <stop offset="50%" stop-color="#E0D1A0"/>
      <stop offset="100%" stop-color="#8E7742"/>
    </linearGradient>

    <linearGradient id="rule" x1="0" x2="1">
      <stop offset="0%" stop-color="#CDBB82" stop-opacity="0"/>
      <stop offset="50%" stop-color="#CDBB82" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#CDBB82" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="engrave" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence baseFrequency=".018" numOctaves="3" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
    </filter>
  </defs>

  <rect width="1200" height="430" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="24" fill="url(#glow)"/>
  <rect width="1200" height="430" rx="24" fill="url(#paper)"/>

  <rect x="18" y="18" width="1164" height="394" rx="17" fill="none" stroke="#CDBB82" stroke-opacity=".25"/>
  <rect x="29" y="29" width="1142" height="372" rx="13" fill="none" stroke="#E8DDBE" stroke-opacity=".075"/>

  <!-- ornamentos laterais -->
  <path d="M63 365V117C63 72 96 47 135 35C174 47 207 72 207 117V365" fill="none" stroke="#CDBB82" stroke-opacity=".09" stroke-width="2"/>
  <path d="M993 365V117C993 72 1026 47 1065 35C1104 47 1137 72 1137 117V365" fill="none" stroke="#CDBB82" stroke-opacity=".09" stroke-width="2"/>
  <path d="M90 365V139C90 101 111 77 135 61C159 77 180 101 180 139V365" fill="none" stroke="#E8DDBE" stroke-opacity=".06"/>
  <path d="M1020 365V139C1020 101 1041 77 1065 61C1089 77 1110 101 1110 139V365" fill="none" stroke="#E8DDBE" stroke-opacity=".06"/>

  <!-- retrato principesco em estilo de gravura -->
  <g transform="translate(255 215)" filter="url(#engrave)">
    <ellipse rx="154" ry="165" fill="#070B12" stroke="#CDBB82" stroke-opacity=".32" stroke-width="2"/>
    <ellipse rx="143" ry="154" fill="none" stroke="#E8DDBE" stroke-opacity=".09"/>

    <!-- coroa -->
    <path d="M-61 -104L-42 -145L-11 -112L9 -157L35 -113L66 -146L78 -99Z"
          fill="#0E1829" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-55 -95H73" stroke="#D5C28B" stroke-width="3"/>
    <circle cx="-42" cy="-145" r="4" fill="#D5C28B"/>
    <circle cx="9" cy="-157" r="4" fill="#D5C28B"/>
    <circle cx="66" cy="-146" r="4" fill="#D5C28B"/>

    <!-- cabelo -->
    <path d="M-56 -56C-58 -95 -26 -116 11 -115C45 -114 70 -93 68 -56
             C55 -72 40 -80 19 -81C-8 -82 -33 -72 -56 -56Z"
          fill="#131C29" stroke="#BBAA7A" stroke-opacity=".72" stroke-width="2"/>
    <path d="M-49 -62C-23 -88 34 -94 60 -60M-39 -76C-10 -98 27 -99 50 -78"
          fill="none" stroke="#D8CAA0" stroke-opacity=".32"/>

    <!-- rosto -->
    <path d="M-50 -53C-51 1 -41 45 -4 66C16 77 43 66 55 46C68 24 70 -12 61 -51
             C38 -68 -21 -69 -50 -53Z"
          fill="#C8B894" fill-opacity=".11" stroke="#D8CAA0" stroke-opacity=".8" stroke-width="2"/>

    <!-- traços -->
    <path d="M-31 -24C-18 -31 -5 -30 6 -24M26 -25C38 -30 48 -28 57 -22"
          fill="none" stroke="#E5D8B7" stroke-width="2"/>
    <path d="M-27 -15C-15 -10 -4 -10 5 -16M29 -16C39 -10 49 -11 56 -17"
          fill="none" stroke="#8FA5C8" stroke-opacity=".8"/>
    <path d="M16 -18C13 2 10 15 18 20" fill="none" stroke="#D8CAA0" stroke-opacity=".7"/>
    <path d="M-2 36C9 42 28 42 39 34" fill="none" stroke="#E5D8B7" stroke-width="2"/>
    <path d="M-9 56C4 65 28 66 42 54" fill="none" stroke="#8FA5C8" stroke-opacity=".4"/>

    <!-- manto -->
    <path d="M-106 146C-89 95 -56 68 -20 61C-1 75 26 75 48 60
             C88 74 116 102 129 146Z"
          fill="#0C1525" stroke="#CDBB82" stroke-opacity=".55" stroke-width="2"/>
    <path d="M-19 64L8 99L48 61M-63 94C-37 106 -20 123 -6 145M88 94C57 106 38 124 27 145"
          fill="none" stroke="#D8CAA0" stroke-opacity=".35"/>
    <path d="M2 97L14 78L27 99L15 118Z" fill="#314D75" stroke="#CDBB82" stroke-opacity=".7"/>
  </g>

  <!-- brasão lateral -->
  <g transform="translate(135 215)">
    <circle r="37" fill="#09111E" stroke="#CDBB82" stroke-opacity=".35"/>
    <circle r="29" fill="none" stroke="#E8DDBE" stroke-opacity=".1"/>
    <text x="0" y="9" text-anchor="middle" fill="#E5D8B7" font-family="Georgia, serif" font-size="27" font-weight="700" letter-spacing="2">WM</text>
  </g>

  <!-- tipografia -->
  <text x="760" y="148" text-anchor="middle" fill="#F1E8D2"
        font-family="Georgia, 'Times New Roman', serif" font-size="55" font-weight="700"
        letter-spacing="8" filter="url(#shadow)">WESLEY MAIA</text>

  <rect x="532" y="176" width="456" height="1.5" fill="url(#rule)"/>

  <text x="760" y="216" text-anchor="middle" fill="#CDBB82"
        font-family="Georgia, 'Times New Roman', serif" font-size="18"
        letter-spacing="4">DESENVOLVIMENTO DE SOFTWARE</text>

  <text x="760" y="252" text-anchor="middle" fill="#AEBBD0"
        font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        letter-spacing="2.4">WEB · BACK-END · AUTOMAÇÃO · INTEGRAÇÕES</text>

  <text x="760" y="302" text-anchor="middle" fill="#D8D0BF"
        font-family="Georgia, 'Times New Roman', serif" font-size="16"
        font-style="italic" letter-spacing=".8">
    “Construindo sistemas feitos para permanecer.”
  </text>

  <!-- pequena coroa -->
  <g transform="translate(760 346)">
    <path d="M-18 7L-12 -7L0 2L12 -7L18 7Z" fill="none" stroke="#CDBB82" stroke-width="1.5"/>
    <path d="M-15 10H15" stroke="#CDBB82" stroke-width="1.5"/>
  </g>
</svg>